name: Publish Desktop Installers

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Existing GitHub Release tag to receive the installers
        required: true
        default: v26.1.4
        type: string

permissions:
  contents: write

jobs:
  build-and-upload:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS Intel
            os: macos-13
            rust_target: x86_64-apple-darwin
            bundles: dmg
            assets: src-tauri/target/x86_64-apple-darwin/release/bundle/dmg/*.dmg
          - name: macOS Apple Silicon
            os: macos-14
            rust_target: aarch64-apple-darwin
            bundles: dmg
            assets: src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg
          - name: Linux x64
            os: ubuntu-22.04
            rust_target: x86_64-unknown-linux-gnu
            bundles: appimage,deb
            assets: src-tauri/target/release/bundle/appimage/*.AppImage src-tauri/target/release/bundle/deb/*.deb

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install frontend dependencies
        run: npm ci

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            fakeroot \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            libwebkit2gtk-4.1-dev \
            libxdo-dev \
            patchelf

      - name: Build installers
        run: npx tauri build --target ${{ matrix.rust_target }} --bundles ${{ matrix.bundles }}

      - name: Attach installers to the existing Release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          shopt -s nullglob
          assets=(${{ matrix.assets }})
          if [ ${#assets[@]} -eq 0 ]; then
            echo "No installer assets were produced."
            exit 1
          fi
          gh release upload "${{ inputs.tag }}" "${assets[@]}" --clobber --repo "$GITHUB_REPOSITORY"
