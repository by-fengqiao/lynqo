changelog:
  categories:
    - title: "🚀 New Features"
      labels:
        - "feature"
        - "enhancement"
    - title: "🐛 Bug Fixes"
      labels:
        - "bug"
        - "bugfix"
        - "fix"
    - title: "📚 Documentation"
      labels:
        - "documentation"
        - "docs"
    - title: "🧰 Maintenance"
      labels:
        - "chore"
        - "dependencies"
        - "ci"
    - title: "Other Changes"
      labels:
        - "*"
  exclude:
    labels:
      - "skip-changelog"
  change-template: "- $TITLE (#$NUMBER)"
  change-title-escapes: "\\<*_&"
