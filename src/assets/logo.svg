<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Connecting lines with directional flow arrows -->
  <!-- Top-left to Right -->
  <path d="M11.5 10.5L19.5 14.5" stroke="#3E4756" stroke-width="2" stroke-linecap="round"/>
  <!-- Bottom-left to Right -->
  <path d="M11.5 21.5L19.5 17.5" stroke="#3E4756" stroke-width="2" stroke-linecap="round"/>
  <!-- Top-left to Bottom-left -->
  <path d="M8 13.5L8 18.5" stroke="#3E4756" stroke-width="2" stroke-linecap="round"/>

  <!-- Arrowheads indicating data flow direction -->
  <!-- Arrow on top-left to right line -->
  <path d="M17.5 12.5L20 14.5L17.5 15.5" stroke="#3E4756" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Arrow on bottom-left to right line -->
  <path d="M17.5 19.5L20 17.5L17.5 16.5" stroke="#3E4756" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Arrow on vertical line (downward) -->
  <path d="M6.5 17L8 19L9.5 17" stroke="#3E4756" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Three nodes -->
  <!-- Top-left node: slate gray -->
  <circle cx="8" cy="9" r="4" fill="#3E4756"/>
  <!-- Right node: cobalt blue (accent) -->
  <circle cx="24" cy="16" r="4" fill="#246BFF"/>
  <!-- Bottom-left node: slate gray -->
  <circle cx="8" cy="23" r="4" fill="#3E4756"/>
</svg>
